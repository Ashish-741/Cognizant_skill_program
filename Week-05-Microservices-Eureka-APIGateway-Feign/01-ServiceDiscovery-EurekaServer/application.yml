server:
  port: 8761 # Default standard port for Eureka Server

eureka:
  instance:
    hostname: localhost
  client:
    # The Eureka Server does not need to register with itself
    register-with-eureka: false
    # The Eureka Server does not need to fetch the registry from itself
    fetch-registry: false
    service-url:
      defaultZone: http://${eureka.instance.hostname}:${server.port}/eureka/

spring:
  application:
    name: discovery-server
